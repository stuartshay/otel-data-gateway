name: Publish Types Package

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  TYPES_PKG_DIR: packages/graphql-types

jobs:
  publish:
    name: Generate & Publish Types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build types package
        run: npm run build:types-package

      - name: Set package version from release tag
        run: |
          # Extract version from tag (v1.0.8 → 1.0.8)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          cd ${{ env.TYPES_PKG_DIR }}
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "Package version: $TAG_VERSION"

      - name: Publish to npm
        run: |
          cd ${{ env.TYPES_PKG_DIR }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get published version
        id: types_version
        run: |
          PKG_VERSION=$(jq -r '.version' ${{ env.TYPES_PKG_DIR }}/package.json)
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Trigger otel-data-ui types update
        id: ui_dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          repository: stuartshay/otel-data-ui
          event-type: otel-graphql-types-release
          client-payload: '{"version": "${{ steps.types_version.outputs.version }}"}'
        continue-on-error: true

      - name: Summary
        run: |
          if [ "${{ steps.ui_dispatch.outcome }}" = "success" ]; then
            DISPATCH_STATUS="✅"
          else
            DISPATCH_STATUS="❌ (${{ steps.ui_dispatch.outcome }})"
          fi
          {
            echo "## npm Package Published"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Package | \`@stuartshay/otel-graphql-types\` |"
            echo "| Version | \`${{ steps.types_version.outputs.version }}\` |"
            echo "| Release | \`${{ github.event.release.tag_name }}\` |"
            echo "| UI Dispatch | ${DISPATCH_STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"
