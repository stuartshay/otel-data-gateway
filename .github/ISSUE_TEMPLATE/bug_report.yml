---
name: Bug Report
description: Report a bug in otel-data-gateway
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: input
    id: query
    attributes:
      label: Affected GraphQL Query / Resolver
      description: Which GraphQL query or resolver is affected?
      placeholder: "e.g., garminActivities, locationCount, health"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: graphql_query
    attributes:
      label: GraphQL Query
      description: The query that reproduces the issue.
      render: graphql
      placeholder: |
        query {
          garminActivities(limit: 10) {
            items {
              id
              activityName
            }
          }
        }
    validations:
      required: true

  - type: textarea
    id: response
    attributes:
      label: Response / Error
      description: The actual response or error message received.
      render: json

  - type: dropdown
    id: error_source
    attributes:
      label: Error Source
      description: Where does the error originate?
      options:
        - Gateway (resolver / schema)
        - Upstream otel-data-api (REST)
        - Cache (stale or incorrect data)
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where does this occur?
      options:
        - Production (gateway.lab.informationcart.com)
        - Local development (localhost:4000)
        - Docker container
        - CI pipeline
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Gateway version from health query
      placeholder: "e.g., 1.0.71"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (pod logs, Apollo Server errors).
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked the existing issues for duplicates
          required: true
        - label: I have tested with the latest version on master
